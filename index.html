<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Social Care Revision</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%238b5cf6%22/><text y=%22.9em%22 font-size=%2270%22 font-weight=%22900%22 font-family=%22Arial%22 fill=%22white%22 x=%2250%%22 text-anchor=%22middle%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03050a;
            --glass: rgba(15, 23, 42, 0.9);
            --primary: #8b5cf6;
            --secondary: #06b6d4;
            --accent: #10b981;
            --text: #f8fafc;
            --gold: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #03050a 100%);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- LOGO STYLE --- */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hsc-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .logo-text {
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: -1px;
        }

        .logo-text span {
            color: var(--secondary);
        }

        header {
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* --- THE REST OF YOUR CSS REMAINS THE SAME --- */
        .grade-badge { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; }
        .selector-bar { display: flex; justify-content: center; gap: 8px; padding: 10px; background: rgba(0,0,0,0.5); flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.2s; }
        .filter-btn.active { background: var(--secondary); color: #000; border-color: var(--secondary); }
        .tab-bar { display: flex; justify-content: center; gap: 10px; padding: 10px 0; }
        .tab { padding: 8px 20px; border-radius: 10px; cursor: pointer; font-weight: 800; background: rgba(255,255,255,0.05); color: #94a3b8; }
        .tab.active { background: var(--primary); color: white; }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .view { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        .card-3d { width: 450px; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-3d.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); text-align: center; box-sizing: border-box; }
        .face-front { background: var(--glass); border-color: var(--secondary); }
        .face-back { background: var(--primary); transform: rotateY(180deg); font-size: 1.1rem; }
        .exam-panel { background: var(--glass); padding: 25px; border-radius: 25px; width: 100%; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box;}
        .q-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 15px; }
        .q-num { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; padding: 6px; border-radius: 5px; cursor: pointer; text-align: center; }
        .q-num.active { border-color: var(--secondary); background: rgba(6, 182, 212, 0.2); }
        .editor { width: 100%; min-height: 120px; background: #000; border: 1px solid #334155; border-radius: 15px; padding: 15px; color: white; font-family: inherit; margin: 15px 0; resize: none; box-sizing: border-box; }
        .btn { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-p { background: var(--secondary); color: #000; }
        .btn-s { background: #1e293b; color: white; }
        .btn-ok { background: var(--accent); color: #000; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .m-content { background: #1e293b; width: 100%; max-width: 800px; border-radius: 25px; padding: 30px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="hsc-icon">H</div>
        <div class="logo-text">Health Social Care<span>Revision</span></div>
    </div>
    <div id="grade-badge" class="grade-badge">GRADE: U</div>
</header>

<div class="selector-bar">
    <button class="filter-btn active" onclick="setTopic('ALL', this)">ALL TOPICS</button>
    <button class="filter-btn" onclick="setTopic('LO1', this)">LO1: RIGHTS</button>
    <button class="filter-btn" onclick="setTopic('LO2', this)">LO2: LAWS</button>
    <button class="filter-btn" onclick="setTopic('LO3', this)">LO3: COMMS</button>
    <button class="filter-btn" onclick="setTopic('LO4', this)">LO4: SAFETY</button>
</div>

<div class="tab-bar">
    <div class="tab active" id="tab-flash" onclick="setView('flash')">Flashcards</div>
    <div class="tab" id="tab-exam" onclick="setView('exam')">Exam Mode</div>
</div>

<main>
    <div id="view-flash" class="view" style="display:flex;">
        <div class="card-3d" id="fc-trigger" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="face face-front">
                    <small id="fc-tag" style="color:var(--secondary); letter-spacing:2px; font-weight:800;"></small>
                    <h2 id="fc-term" style="font-size:2rem; margin:15px 0;">Term</h2>
                    <p style="font-size:0.7rem; opacity:0.5;">Click to reveal definition</p>
                </div>
                <div class="face face-back" id="fc-def">Definition</div>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-s" onclick="moveFC(-1)">Previous</button>
            <button class="btn btn-ok" onclick="masterFC()">Mastered</button>
            <button class="btn btn-s" onclick="moveFC(1)">Next</button>
        </div>
        <p id="fc-count" style="margin-top:20px; color:#94a3b8; font-weight:bold;">Card 1 / 120</p>
    </div>

    <div id="view-exam" class="view">
        <div class="exam-panel">
            <div class="q-grid" id="ex-grid"></div>
            <div style="display:flex; justify-content:space-between; color:var(--secondary); font-weight:800; font-size:0.8rem;">
                <span id="ex-tag">UNIT</span>
                <span id="ex-count">Question 1 / 30</span>
            </div>
            <h2 id="ex-question" style="margin:15px 0; font-size:1.3rem;">Question Text...</h2>
            <textarea id="ex-ans" class="editor" placeholder="Type your exam response here..."></textarea>
            <div style="display:flex; justify-content:space-between;">
                <button class="btn btn-s" onclick="moveEX(-1)">Back</button>
                <button class="btn btn-p" onclick="openGrade()">Grade Answer</button>
                <button class="btn btn-s" onclick="moveEX(1)">Next</button>
            </div>
        </div>
    </div>
</main>

<div id="modal">
    <div class="m-content">
        <h2 style="text-align:center; color:var(--secondary); margin-bottom:20px;">Marking Scheme</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px;">
            <div>
                <small>Your Answer:</small>
                <div id="m-user" style="background:#000; padding:15px; border-radius:15px; height:150px; overflow-y:auto; font-size:0.9rem;"></div>
            </div>
            <div>
                <small>Indicative Content:</small>
                <div id="m-scheme" style="background:#000; padding:15px; border-radius:15px; height:150px; overflow-y:auto; border:1px solid var(--accent); font-size:0.9rem;"></div>
            </div>
        </div>
        <div style="text-align:center;">
            <p>Award Marks (Max <span id="m-max"></span>): 
                <input type="number" id="m-score" style="width:60px; background:none; border:2px solid var(--primary); color:white; text-align:center; padding:5px; border-radius:8px;">
            </p>
            <button class="btn btn-p" onclick="confirmGrade()" style="margin-left:15px;">Submit Score</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
<script>
// --- DATA AND SCRIPT REMAIN IDENTICAL TO PREVIOUS VERSION ---
const DATA = {
    LO1: {
        terms: [
            {t:"Choice", d:"Allowing users to select preferences like food, clothing, or GP to increase independence."},
            {t:"Confidentiality", d:"Sharing info only on a 'need-to-know' basis to maintain trust."},
            {t:"Protection from Harm", d:"Following safeguarding and safety procedures to prevent injury or abuse."},
            {t:"Equal Opportunity", d:"Fair access to services regardless of background or disability."},
            {t:"Consultation", d:"Asking for a user's opinions and views on their care and treatment options."},
            {t:"Dignity", d:"Respecting privacy, using correct names, and not embarrassing the user."},
            {t:"Advocacy", d:"An independent person speaking for a user who cannot express their own wishes."},
            {t:"Empowerment", d:"Giving users control over their lives to build self-esteem and independence."},
            {t:"Right to Life", d:"Protected by the Human Rights Act; ensures basic safety and medical care."},
            {t:"Diversity", d:"Accepting, respecting, and celebrating individual differences and cultures."},
            {t:"Redress", d:"The right to have a complaint heard and a solution provided."},
            {t:"Effective Comms", d:"Using appropriate language, pace, and active listening with users."},
            {t:"Person-Centered", d:"Care tailored to the specific needs, history, and whims of one individual."},
            {t:"PIES", d:"Physical, Intellectual, Emotional, and Social needs of a human."},
            {t:"Values of Care", d:"The core principles (e.g., promoting rights) that guide all H&SC work."},
            {t:"Holistic", d:"Caring for the 'whole person' (all PIES), not just a physical symptom."},
            {t:"Self-Esteem", d:"How a user feels about themselves; boosted by respect and choice."},
            {t:"Inclusion", d:"Actively ensuring no one is left out of activities or healthcare."},
            {t:"Anti-Discriminatory", d:"Actively challenging unfair treatment or prejudiced comments."},
            {t:"Privacy", d:"Ensuring personal space (curtains) and secure data (locked files)."},
            {t:"Informal Care", d:"Unpaid care provided by friends, family, or neighbors."},
            {t:"Formal Care", d:"Professional, paid care (e.g., Hospitals, Residential homes, Social work)."},
            {t:"Independence", d:"The ability to do things for oneself; a key goal of empowerment."},
            {t:"Patronising", d:"Speaking to a service user as if they are a child; violates dignity."},
            {t:"Stereotyping", d:"Making assumptions about a person based on a group they belong to."},
            {t:"Prejudice", d:"A negative 'pre-judgment' about a person before meeting them."},
            {t:"Reflective Practice", d:"When a carer looks back at their work to see how to improve."},
            {t:"Whistleblowing", d:"Reporting bad or illegal practice in the workplace to authorities."},
            {t:"Equality", d:"Treating people fairly based on their specific needs (Equity)."},
            {t:"Beliefs", d:"Respecting a user's religion, spirituality, or personal philosophy."}
        ],
        exams: [
            {q: "Identify three rights of a service user in a residential care home. (3 Marks)", ms: "Choice, Confidentiality, Protection from harm, Consultation, Right to life.", max: 3},
            {q: "Explain how a nursery teacher can promote 'Diversity' within a classroom. (4 Marks)", ms: "Celebrate different religious festivals (1), provide toys/books showing different cultures (1), use multi-language signs (1), celebrate different foods (1).", max: 4},
            {q: "Describe the role of an Advocate. (2 Marks)", ms: "Someone who speaks on behalf of a user (1) to ensure their voice and rights are heard (1).", max: 2},
            {q: "Evaluate the impact on a service user if their right to 'Confidentiality' is broken. (6 Marks)", ms: "Loss of trust in staff (1), feeling embarrassed/humiliated (1), may stop seeking treatment (1), lead to low self-esteem (1), stress or anxiety (1), social isolation (1).", max: 6},
            {q: "State two ways a GP surgery could provide 'Redress' to a patient. (2 Marks)", ms: "Apology (1), explanation of what went wrong (1), offering a new appointment/treatment (1).", max: 2}
        ]
    },
    LO2: {
        terms: [
            {t:"Equality Act 2010", d:"Consolidated law protecting 9 characteristics from discrimination."},
            {t:"Mental Capacity Act", d:"Framework for making decisions for those unable to do so themselves."},
            {t:"Children Act 2004", d:"Introduced 'Every Child Matters' and the Paramountcy Principle."},
            {t:"Data Protection Act", d:"Legal rules for how personal info (GDPR) is stored and processed."},
            {t:"Care Act 2014", d:"Duty for local councils to assess anyone who needs care."},
            {t:"HASAWA 1974", d:"Health and Safety at Work Act; responsibilities for bosses and staff."},
            {t:"CQC", d:"Care Quality Commission; inspectors for hospitals and care homes."},
            {t:"Ofsted", d:"Inspectors for schools, nurseries, and childminders."},
            {t:"DBS Check", d:"Disclosure and Barring Service; checks for criminal history."},
            {t:"9 Protected Char.", d:"Age, Disability, Gender Reassignment, Marriage, Pregnancy, Race, Religion, Sex, Orientation."},
            {t:"Direct Discrim.", d:"Treating someone less favourably specifically because of a characteristic."},
            {t:"Indirect Discrim.", d:"A rule/policy that applies to all but disadvantages one specific group."},
            {t:"Reasonable Adj.", d:"Changes (ramps, braille) to help disabled people access services."},
            {t:"Harassment", d:"Unwanted behaviour that violates dignity or creates a hostile environment."},
            {t:"Victimization", d:"Bad treatment because someone made a complaint under the Equality Act."},
            {t:"Duty of Care", d:"The legal duty to avoid acts or omissions that could cause harm."},
            {t:"Need to Know", d:"Principle that info is only shared with those directly involved in care."},
            {t:"Paramountcy", d:"The child's welfare must always come first in any court decision."},
            {t:"Advocacy", d:"Legal right to support for those who struggle to be involved in care decisions."},
            {t:"Redress", d:"Legal path to a remedy (compensation/apology) after a right is breached."}
        ],
        exams: [
            {q: "List four 'Protected Characteristics' under the Equality Act 2010. (4 Marks)", ms: "Age, Disability, Race, Religion/Belief, Sex, Sexual Orientation, Pregnancy, Gender Reassignment, Marriage/Civil Partnership.", max: 4},
            {q: "Explain how the Data Protection Act (GDPR) protects service users. (4 Marks)", ms: "Data must be kept secure (1), kept up to date (1), used only for stated purpose (1), not kept longer than necessary (1).", max: 4},
            {q: "What is the 'Paramountcy Principle' found in the Children Act? (2 Marks)", ms: "The child's needs and welfare must come before anything else (1) in all decisions made by authorities/courts (1).", max: 2},
            {q: "Describe two responsibilities of an EMPLOYEE under HASAWA 1974. (4 Marks)", ms: "Take care of own health/safety (1), cooperate with employer (1), report hazards (1), don't misuse equipment (1).", max: 4},
            {q: "State the role of the Care Quality Commission (CQC). (2 Marks)", ms: "To inspect and regulate (1) health and social care services to ensure they meet standards (1).", max: 2}
        ]
    },
    LO3: {
        terms: [
            {t:"Active Listening", d:"Using nodding, eye contact, and 'mhm' to show you are engaged."},
            {t:"Jargon", d:"Professional 'medical speak' that confuses patients (e.g., 'Acute Myocardial Infarction')."},
            {t:"Non-Verbal Comms", d:"Body language, posture, and facial expressions (55% of communication)."},
            {t:"Verbal Comms", d:"Tone, pitch, and the actual words spoken."},
            {t:"Eye Contact", d:"Builds trust, but must be avoided in some cultures as a sign of respect."},
            {t:"Empathy", d:"Putting yourself in the user's shoes to understand their distress."},
            {t:"Open Questions", d:"Starting with 'How' or 'Describe'; prevents one-word answers."},
            {t:"Makaton", d:"A system of signs and symbols used with people with learning disabilities."},
            {t:"Braille", d:"Raised dots that allow visually impaired users to read by touch."},
            {t:"Language Barrier", d:"When a carer and user do not share a common primary language."},
            {t:"Interpreter", d:"A professional who converts spoken language in real-time."},
            {t:"Hearing Loop", d:"Magnetic system that cuts out background noise for hearing aid users."},
            {t:"SOLER", d:"Sit Square, Open posture, Lean in, Eye contact, Relaxed (Communication acronym)."},
            {t:"Proximity", d:"Personal space; standing too close can make a user feel threatened."},
            {t:"Clarifying", d:"Asking 'So you mean...?' to ensure the message was received correctly."},
            {t:"Reflecting", d:"Mirroring the user's feelings ('I can see you feel upset about this')."},
            {t:"BSL", d:"British Sign Language; used by the DeaF community."},
            {t:"Facilitators", d:"Things that make communication easier (e.g., quiet room, hearing aids)."},
            {t:"Barriers", d:"Things that block communication (e.g., noise, jargon, heavy accent)."},
            {t:"Cultural Variations", d:"Differences in how people communicate (e.g., some cultures avoid direct eye contact)."}
        ],
        exams: [
            {q: "Explain how 'Jargon' acts as a barrier to communication. (3 Marks)", ms: "User doesn't understand technical terms (1), makes them feel stupid or excluded (1), leads to confusion about treatment (1).", max: 3},
            {q: "Describe the 'SOLER' technique for effective communication. (5 Marks)", ms: "S: Sit Squarely (1), O: Open Posture (1), L: Lean forward (1), E: Eye Contact (1), R: Relaxed (1).", max: 5},
            {q: "Identify two communication aids for a person with a significant hearing impairment. (2 Marks)", ms: "Hearing loop (1), BSL Interpreter (1), Flashcards/written notes (1), Hearing Aid (1).", max: 2},
            {q: "Why is 'Empathy' important when communicating with a distressed service user? (3 Marks)", ms: "Makes the user feel understood (1), helps build a therapeutic relationship (1), lowers anxiety levels (1).", max: 3},
            {q: "State how environmental factors like 'Noise' can affect an interview in a hospital. (2 Marks)", ms: "Prevents the user from hearing instructions (1), creates a lack of privacy/confidentiality (1).", max: 2}
        ]
    },
    LO4: {
        terms: [
            {t:"PPE", d:"Personal Protective Equipment: Gloves, aprons, masks, visors."},
            {t:"RIDDOR", d:"Law requiring reporting of major injuries and dangerous 'near misses'."},
            {t:"COSHH", d:"Law for storing 'bleach, medicines, and cleaning fluids' in locked cupboards."},
            {t:"Hazard", d:"Anything that could cause harm (e.g., a wet floor, a frayed wire)."},
            {t:"Risk", d:"The chance (high/low) that a hazard will actually hurt someone."},
            {t:"Manual Handling", d:"Techniques for lifting people or boxes without injuring your back."},
            {t:"Chain of Infection", d:"How germs travel: Agent -> Reservoir -> Portal of Exit -> Mode -> Portal of Entry -> Host."},
            {t:"Clinical Waste", d:"Yellow bag: Swabs, dressings, and bandages with body fluids."},
            {t:"Sharps Bin", d:"Yellow hard plastic box for needles and scalpels."},
            {t:"Danger Zone", d:"5°C to 63°C: The temperature where bacteria multiply fastest."},
            {t:"70°C", d:"The core temperature food should reach to be safe from bacteria."},
            {t:"Cross-Contam.", d:"Moving bacteria from raw meat to cooked food via a knife or board."},
            {t:"Risk Assessment", d:"1. Identify hazard, 2. Decide who is at risk, 3. Evaluate risk, 4. Record, 5. Review."},

            {t:"MOPP", d:"Manual of Protective Procedures (Local workplace safety rules)."},
            {t:"Fire Assembly Point", d:"Designated safe area to meet during a fire drill."},
            {t:"Frayed Cable", d:"An electrical hazard that can cause shocks or fires."},
            {t:"Body Fluids", d:"Blood, vomit, urine; all considered hazardous and requiring PPE."},
            {t:"Social Handwash", d:"Standard 20-second wash with soap and water."},
            {t:"Reporting", d:"Recording an accident in the Accident Book (Legal requirement)."}
        ],
        exams: [
            {q: "What does the acronym COSHH stand for? (1 Mark)", ms: "Control of Substances Hazardous to Health.", max: 1},
            {q: "Outline the five stages of a Risk Assessment. (5 Marks)", ms: "1. Identify hazards (1), 2. Decide who might be harmed (1), 3. Evaluate risks/precautions (1), 4. Record findings (1), 5. Review assessment (1).", max: 5},
            {q: "Identify three items of PPE a carer should wear when cleaning a spill of blood. (3 Marks)", ms: "Disposable gloves, Disposable apron, Face mask/visor.", max: 3},
            {q: "Describe the 'Danger Zone' for food safety. (2 Marks)", ms: "Temperatures between 5°C and 63°C (1) where bacteria grow most rapidly (1).", max: 2},
            {q: "Explain why 'Manual Handling' training is mandatory for care assistants. (4 Marks)", ms: "Protects staff from back injuries (1), protects service users from being dropped (1), legal requirement under HASAWA (1), ensures use of equipment like hoists (1).", max: 4}
        ]
    }
};

let curTopic = 'ALL';
let fList = [], eList = [];
let fIdx = 0, eIdx = 0, score = 0, tMax = 0;

function setTopic(lo, btn) {
    curTopic = lo;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(lo === 'ALL') {
        fList = [...DATA.LO1.terms, ...DATA.LO2.terms, ...DATA.LO3.terms, ...DATA.LO4.terms];
        eList = [...DATA.LO1.exams, ...DATA.LO2.exams, ...DATA.LO3.exams, ...DATA.LO4.exams];
    } else {
        fList = DATA[lo].terms;
        eList = DATA[lo].exams;
    }
    fIdx = 0; eIdx = 0;
    renderGrid(); updateFC(); updateEX();
}

function setView(v) {
    document.querySelectorAll('.view').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
    document.getElementById(`view-${v}`).style.display = 'flex';
    document.getElementById(`tab-${v}`).classList.add('active');
}

function updateFC() {
    const c = fList[fIdx];
    document.getElementById('fc-trigger').classList.remove('flipped');
    setTimeout(() => {
        document.getElementById('fc-tag').innerText = 'KEY TERM';
        document.getElementById('fc-term').innerText = c.t;
        document.getElementById('fc-def').innerText = c.d;
        document.getElementById('fc-count').innerText = `Card ${fIdx + 1} / ${fList.length}`;
    }, 150);
}

function moveFC(d) { fIdx = (fIdx + d + fList.length) % fList.length; updateFC(); }
function masterFC() { score += 2; tMax += 2; updateGrade(); moveFC(1); confetti(); }

function renderGrid() {
    const g = document.getElementById('ex-grid');
    g.innerHTML = '';
    eList.forEach((_, i) => {
        const n = document.createElement('div');
        n.className = 'q-num';
        n.innerText = i + 1;
        n.onclick = () => { eIdx = i; updateEX(); };
        g.appendChild(n);
    });
}

function updateEX() {
    const q = eList[eIdx];
    document.getElementById('ex-tag').innerText = curTopic === 'ALL' ? 'MIXED' : curTopic;
    document.getElementById('ex-count').innerText = `Question ${eIdx + 1} / ${eList.length}`;
    document.getElementById('ex-question').innerText = q.q;
    document.getElementById('ex-ans').value = "";
    document.querySelectorAll('.q-num').forEach((n, i) => n.classList.toggle('active', i === eIdx));
}

function moveEX(d) { eIdx = (eIdx + d + eList.length) % eList.length; updateEX(); }

function openGrade() {
    const q = eList[eIdx];
    document.getElementById('m-user').innerText = document.getElementById('ex-ans').value || "No answer provided.";
    document.getElementById('m-scheme').innerText = q.ms;
    document.getElementById('m-max').innerText = q.max;
    document.getElementById('modal').style.display = 'flex';
}

function confirmGrade() {
    const s = parseInt(document.getElementById('m-score').value) || 0;
    score += s; tMax += eList[eIdx].max;
    document.getElementById('modal').style.display = 'none';
    updateGrade();
    if(s >= eList[eIdx].max) confetti();
}

function updateGrade() {
    const p = (score / tMax) * 100;
    let g = "U", c = "#94a3b8";
    if(p >= 80) { g = "Dist*"; c = "#f59e0b"; }
    else if(p >= 65) { g = "Dist"; c = "#a855f7"; }
    else if(p >= 50) { g = "Merit"; c = "#3b82f6"; }
    else if(p >= 40) { g = "Pass"; c = "#10b981"; }
    document.getElementById('grade-badge').innerText = "GRADE: " + g;
    document.getElementById('grade-badge').style.background = c;
}

setTopic('ALL', document.querySelector('.filter-btn'));
</script>
</body>
</html>
