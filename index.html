<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Social Care Revision</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%238b5cf6%22/><text y=%22.9em%22 font-size=%2270%22 font-weight=%22900%22 font-family=%22Arial%22 fill=%22white%22 x=%2250%%22 text-anchor=%22middle%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03050a;
            --glass: rgba(15, 23, 42, 0.9);
            --primary: #8b5cf6;
            --secondary: #06b6d4;
            --accent: #10b981;
            --text: #f8fafc;
            --gold: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #03050a 100%);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- LOGO STYLE --- */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hsc-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .logo-text {
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: -1px;
        }

        .logo-text span {
            color: var(--secondary);
        }

        header {
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* --- THE REST OF YOUR CSS REMAINS THE SAME --- */
        .grade-badge { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; }
        .selector-bar { display: flex; justify-content: center; gap: 8px; padding: 10px; background: rgba(0,0,0,0.5); flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.2s; }
        .filter-btn.active { background: var(--secondary); color: #000; border-color: var(--secondary); }
        .tab-bar { display: flex; justify-content: center; gap: 10px; padding: 10px 0; }
        .tab { padding: 8px 20px; border-radius: 10px; cursor: pointer; font-weight: 800; background: rgba(255,255,255,0.05); color: #94a3b8; }
        .tab.active { background: var(--primary); color: white; }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .view { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        .card-3d { width: 450px; height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-3d.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); text-align: center; box-sizing: border-box; }
        .face-front { background: var(--glass); border-color: var(--secondary); }
        .face-back { background: var(--primary); transform: rotateY(180deg); font-size: 1.1rem; }
        .exam-panel { background: var(--glass); padding: 25px; border-radius: 25px; width: 100%; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box;}
        .q-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 15px; }
        .q-num { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; padding: 6px; border-radius: 5px; cursor: pointer; text-align: center; }
        .q-num.active { border-color: var(--secondary); background: rgba(6, 182, 212, 0.2); }
        .editor { width: 100%; min-height: 120px; background: #000; border: 1px solid #334155; border-radius: 15px; padding: 15px; color: white; font-family: inherit; margin: 15px 0; resize: none; box-sizing: border-box; }
        .btn { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-p { background: var(--secondary); color: #000; }
        .btn-s { background: #1e293b; color: white; }
        .btn-ok { background: var(--accent); color: #000; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .m-content { background: #1e293b; width: 100%; max-width: 800px; border-radius: 25px; padding: 30px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="hsc-icon">H</div>
        <div class="logo-text">Health Social Care<span>Revision</span></div>
    </div>
    <div id="grade-badge" class="grade-badge">GRADE: U</div>
</header>

<div class="selector-bar">
    <button class="filter-btn active" onclick="setTopic('ALL', this)">ALL TOPICS</button>
    <button class="filter-btn" onclick="setTopic('LO1', this)">LO1: RIGHTS</button>
    <button class="filter-btn" onclick="setTopic('LO2', this)">LO2: LAWS</button>
    <button class="filter-btn" onclick="setTopic('LO3', this)">LO3: COMMS</button>
    <button class="filter-btn" onclick="setTopic('LO4', this)">LO4: SAFETY</button>
</div>

<div class="tab-bar">
    <div class="tab active" id="tab-flash" onclick="setView('flash')">Flashcards</div>
    <div class="tab" id="tab-exam" onclick="setView('exam')">Exam Mode</div>
</div>

<main>
    <div id="view-flash" class="view" style="display:flex;">
        <div class="card-3d" id="fc-trigger" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="face face-front">
                    <small id="fc-tag" style="color:var(--secondary); letter-spacing:2px; font-weight:800;"></small>
                    <h2 id="fc-term" style="font-size:2rem; margin:15px 0;">Term</h2>
                    <p style="font-size:0.7rem; opacity:0.5;">Click to reveal definition</p>
                </div>
                <div class="face face-back" id="fc-def">Definition</div>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-s" onclick="moveFC(-1)">Previous</button>
            <button class="btn btn-ok" onclick="masterFC()">Mastered</button>
            <button class="btn btn-s" onclick="moveFC(1)">Next</button>
        </div>
        <p id="fc-count" style="margin-top:20px; color:#94a3b8; font-weight:bold;">Card 1 / 120</p>
    </div>

    <div id="view-exam" class="view">
        <div class="exam-panel">
            <div class="q-grid" id="ex-grid"></div>
            <div style="display:flex; justify-content:space-between; color:var(--secondary); font-weight:800; font-size:0.8rem;">
                <span id="ex-tag">UNIT</span>
                <span id="ex-count">Question 1 / 30</span>
            </div>
            <h2 id="ex-question" style="margin:15px 0; font-size:1.3rem;">Question Text...</h2>
            <textarea id="ex-ans" class="editor" placeholder="Type your exam response here..."></textarea>
            <div style="display:flex; justify-content:space-between;">
                <button class="btn btn-s" onclick="moveEX(-1)">Back</button>
                <button class="btn btn-p" onclick="openGrade()">Grade Answer</button>
                <button class="btn btn-s" onclick="moveEX(1)">Next</button>
            </div>
        </div>
    </div>
</main>

<div id="modal">
    <div class="m-content">
        <h2 style="text-align:center; color:var(--secondary); margin-bottom:20px;">Marking Scheme</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px;">
            <div>
                <small>Your Answer:</small>
                <div id="m-user" style="background:#000; padding:15px; border-radius:15px; height:150px; overflow-y:auto; font-size:0.9rem;"></div>
            </div>
            <div>
                <small>Indicative Content:</small>
                <div id="m-scheme" style="background:#000; padding:15px; border-radius:15px; height:150px; overflow-y:auto; border:1px solid var(--accent); font-size:0.9rem;"></div>
            </div>
        </div>
        <div style="text-align:center;">
            <p>Award Marks (Max <span id="m-max"></span>): 
                <input type="number" id="m-score" style="width:60px; background:none; border:2px solid var(--primary); color:white; text-align:center; padding:5px; border-radius:8px;">
            </p>
            <button class="btn btn-p" onclick="confirmGrade()" style="margin-left:15px;">Submit Score</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
<script>
// --- DATA AND SCRIPT REMAIN IDENTICAL TO PREVIOUS VERSION ---
const DATA = {
    LO1: {
        terms: [
            {t:"Choice", d:"Allowing users to select preferences like food, clothing, or GP."},
            {t:"Confidentiality", d:"Sharing info only on a 'need-to-know' basis."},
            {t:"Protection from Harm", d:"Following safety procedures to prevent injury or abuse."},
            {t:"Equal Opportunity", d:"Fair access to services regardless of background."},
            {t:"Consultation", d:"Asking for a user's opinions and views on their care."},
            {t:"Dignity", d:"Respecting privacy and not embarrassing the user."},
            {t:"Advocacy", d:"Speaking for a user who cannot speak for themselves."},
            {t:"Empowerment", d:"Giving users control over their own lives and decisions."},
            {t:"Right to Life", d:"Protected by the Human Rights Act; basic safety."},
            {t:"Diversity", d:"Accepting and respecting individual differences/cultures."},
            {t:"Redress", d:"Right to have a complaint dealt with effectively."},
            {t:"Effective Comms", d:"Using appropriate language and listening to users."},
            {t:"Person-Centered", d:"Care tailored to one specific person's needs."},
            {t:"PIES", d:"Physical, Intellectual, Emotional, Social needs."},
            {t:"Values of Care", d:"Principles that guide health and social care work."},
            {t:"Holistic", d:"Caring for the whole person, not just an illness."},
            {t:"Self-Esteem", d:"How a user feels about themselves; boosted by respect."},
            {t:"Inclusion", d:"Ensuring no one is left out of activities or care."},
            {t:"Anti-Discriminatory", d:"Actively challenging unfair treatment."},
            {t:"Privacy", d:"Ensuring personal space and secure data."},
            {t:"Informal Care", d:"Care provided by friends or family (unpaid)."},
            {t:"Formal Care", d:"Care provided by trained professionals (paid)."},
            {t:"Independence", d:"Doing things for oneself without help."},
            {t:"Self-Harm", d:"A risk monitored under protection from harm."},
            {t:"Care Plan", d:"Document outlining a user's specific needs."},
            {t:"Respect", d:"Showing regard for a person's feelings or rights."},
            {t:"Whistleblowing", d:"Reporting bad practice in the workplace."},
            {t:"Equality", d:"Treating people fairly, though not always the same."},
            {t:"Rights", d:"Legal entitlements every service user has."},
            {t:"Beliefs", d:"Respecting a user's religion or spiritual choices."}
        ],
        exams: Array.from({length: 30}, (_, i) => ({
            q: `LO1 Exam Q${i+1}: Evaluate the importance of ${["Choice", "Dignity", "Rights", "Care Values"][i%4]} in a care setting. (6 Marks)`,
            ms: "Detail 3 points with impact on the user. Choice leads to independence. Dignity leads to self-worth.",
            max: 6
        }))
    },
    LO2: {
        terms: [
            {t:"Equality Act 2010", d:"Protects 9 characteristics from discrimination."},
            {t:"Mental Capacity Act", d:"Protects those unable to make their own decisions."},
            {t:"Children Act 2004", d:"Paramountcy principle: Child's needs come first."},
            {t:"Data Protection Act", d:"Controls how personal info is used and stored."},
            {t:"Care Act 2014", d:"Duty for local authorities to promote wellbeing."},
            {t:"HASAWA 1974", d:"Primary law for Health & Safety at work."},
            {t:"CQC", d:"Independent regulator of health and adult social care."},
            {t:"Ofsted", d:"Regulates and inspects education and childcare."},
            {t:"DBS Check", d:"Criminal record check for staff."},
            {t:"Safeguarding", d:"Measures to protect people from harm/abuse."},
            {t:"Direct Discrim.", d:"Treating someone poorly because of a characteristic."},
            {t:"Indirect Discrim.", d:"Rules that disadvantage a specific group."},
            {t:"Reasonable Adj.", d:"Changes to help disabled people access services."},
            {t:"Harassment", d:"Unwanted behavior linked to a characteristic."},
            {t:"Victimization", d:"Punishing someone for making a complaint."},
            {t:"Duty of Care", d:"Legal obligation to keep users safe."},
            {t:"Prot. Charac.", d:"Age, disability, race, religion, sex, etc."},
            {t:"Compliance", d:"Following laws and regulations correctly."},
            {t:"Accountability", d:"Taking responsibility for professional actions."},
            {t:"Mandatory Training", d:"Required learning like Manual Handling."},
            {t:"Best Interests", d:"Decisions made for someone lacking capacity."},
            {t:"Regulatory Body", d:"Organisations that check standards (e.g. CQC)."},
            {t:"Public Sector Duty", d:"Duty to eliminate discrimination in public life."},
            {t:"Statutory Rights", d:"Rights guaranteed by Acts of Parliament."},
            {t:"Vulnerable Adult", d:"Adult at risk of abuse or neglect."},
            {t:"Proportionality", d:"Interventions should be least restrictive."},
            {t:"Policy", d:"A set of rules for a specific workplace."},
            {t:"Procedure", d:"Steps to follow for a specific policy."},
            {t:"Enforcement", d:"Action taken when laws are broken."},
            {t:"Right of Access", d:"User's right to see their own records."}
        ],
        exams: Array.from({length: 30}, (_, i) => ({
            q: `LO2 Exam Q${i+1}: Explain how the ${["Equality Act", "HASAWA", "Care Act", "Children Act"][i%4]} protects service users. (4 Marks)`,
            ms: "Identify the act's core purpose and give 2 specific examples of protection in practice.",
            max: 4
        }))
    },
    LO3: {
        terms: [
            {t:"Active Listening", d:"Giving full attention and showing engagement."},
            {t:"Jargon", d:"Complex technical terms that confuse users."},
            {t:"Non-Verbal Comms", d:"Body language, gestures, and facial expressions."},
            {t:"Verbal Comms", d:"The words and tone used when speaking."},
            {t:"Eye Contact", d:"Shows interest; must be culturally appropriate."},
            {t:"Empathy", d:"Understanding and sharing another's feelings."},
            {t:"Open Questions", d:"Questions requiring more than yes/no."},
            {t:"Closed Questions", d:"Questions requiring simple one-word answers."},
            {t:"Makaton", d:"Language program using signs and symbols."},
            {t:"Braille", d:"Tactile reading system for visually impaired."},
            {t:"Language Barrier", d:"Difficulty when people speak different languages."},
            {t:"Interpreter", d:"Person who translates spoken word."},
            {t:"Translator", d:"Person who translates written word."},
            {t:"Comms Aids", d:"Tools like hearing loops or picture boards."},
            {t:"Tone of Voice", d:"Emotion and volume behind spoken words."},
            {t:"Proximity", d:"Physical distance between people communicating."},
            {t:"Cultural Barrier", d:"Differences in traditions causing confusion."},
            {t:"Env. Barrier", d:"Noise or poor lighting affecting comms."},
            {t:"Emotional Barrier", d:"Distress or anger preventing clear comms."},
            {t:"Slang", d:"Informal language; can be unprofessional."},
            {t:"Patience", d:"Allowing time for a user to process info."},
            {t:"Clarifying", d:"Checking you have understood correctly."},
            {t:"Reflecting", d:"Repeating back feelings to show understanding."},
            {t:"Visual Aids", d:"Flashcards or charts to help explanation."},
            {t:"SOLER", d:"Sit squarely, Open, Lean, Eye contact, Relax."},
            {t:"Sign Language", d:"Hand signs used for communication (BSL)."},
            {t:"Assertiveness", d:"Being firm but remaining respectful."},
            {t:"Feedback", d:"Response given to the speaker."},
            {t:"Hearing Loop", d:"System helping hearing-aid users."},
            {t:"First Impression", d:"Initial thoughts formed about someone."}
        ],
        exams: Array.from({length: 30}, (_, i) => ({
            q: `LO3 Exam Q${i+1}: Describe how ${["Jargon", "Noise", "Body Language", "Active Listening"][i%4]} affects communication. (3 Marks)`,
            ms: "Define the term and explain one positive or negative outcome on the care relationship.",
            max: 3
        }))
    },
    LO4: {
        terms: [
            {t:"Handwashing", d:"Most effective way to stop infection spread."},
            {t:"PPE", d:"Gloves, aprons, masks, and eye protection."},
            {t:"RIDDOR", d:"Reporting of workplace accidents/diseases."},
            {t:"COSHH", d:"Control of hazardous substances."},
            {t:"Hazard", d:"Something with potential to cause harm."},
            {t:"Risk", d:"Likelihood that a hazard will cause harm."},
            {t:"Risk Assessment", d:"Identifying hazards and controlling risks."},
            {t:"Manual Handling", d:"Lifting/moving loads safely."},
            {t:"Chain of Infection", d:"The steps by which a germ spreads."},
            {t:"Cross-Infection", d:"Transferring germs between people/surfaces."},
            {t:"Pathogen", d:"Germ that causes disease (virus/bacteria)."},
            {t:"Sharps Bin", d:"Yellow box for safe needle disposal."},
            {t:"Clinical Waste", d:"Yellow bags for contaminated items."},
            {t:"General Waste", d:"Black bags for non-hazardous rubbish."},
            {t:"Sterilization", d:"Complete destruction of microorganisms."},
            {t:"Disinfection", d:"Reducing germs to a safe level."},
            {t:"Fire Safety", d:"Drills, alarms, and escape routes."},
            {t:"Food Hygiene", d:"Safe handling and storage of food."},
            {t:"Danger Zone", d:"5°C - 63°C: Where bacteria grow fastest."},
            {t:"Cross-Contam.", d:"Germs moving from raw to cooked food."},
            {t:"Incubation", d:"Time between infection and symptoms."},
            {t:"Susceptible Host", d:"Someone at high risk of infection."},
            {t:"Mode of Trans.", d:"How a germ moves (e.g. airborne)."},
            {t:"Lifting Aids", d:"Equipment like hoists to move patients."},
            {t:"First Aid", d:"Immediate help for an injured person."},
            {t:"Spillage Kit", d:"Tools for cleaning body fluids safely."},
            {t:"Pat-Drying", d:"Drying hands with paper to avoid cracks."},
            {t:"Social Handwash", d:"General wash for routine tasks."},
            {t:"Clinical Handwash", d:"Thorough scrub for medical tasks."},
            {t:"Legislation", d:"Laws like HASAWA that enforce safety."}
        ],
        exams: Array.from({length: 30}, (_, i) => ({
            q: `LO4 Exam Q${i+1}: Identify the steps for ${["Handwashing", "COSHH", "Fire Safety", "PPE"][i%4]}. (6 Marks)`,
            ms: "List the correct sequence of actions. Emphasize safety and preventing infection spread.",
            max: 6
        }))
    }
};

let curTopic = 'ALL';
let fList = [], eList = [];
let fIdx = 0, eIdx = 0, score = 0, tMax = 0;

function setTopic(lo, btn) {
    curTopic = lo;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(lo === 'ALL') {
        fList = [...DATA.LO1.terms, ...DATA.LO2.terms, ...DATA.LO3.terms, ...DATA.LO4.terms];
        eList = [...DATA.LO1.exams, ...DATA.LO2.exams, ...DATA.LO3.exams, ...DATA.LO4.exams];
    } else {
        fList = DATA[lo].terms;
        eList = DATA[lo].exams;
    }
    fIdx = 0; eIdx = 0;
    renderGrid(); updateFC(); updateEX();
}

function setView(v) {
    document.querySelectorAll('.view').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
    document.getElementById(`view-${v}`).style.display = 'flex';
    document.getElementById(`tab-${v}`).classList.add('active');
}

function updateFC() {
    const c = fList[fIdx];
    document.getElementById('fc-trigger').classList.remove('flipped');
    setTimeout(() => {
        document.getElementById('fc-tag').innerText = 'KEY TERM';
        document.getElementById('fc-term').innerText = c.t;
        document.getElementById('fc-def').innerText = c.d;
        document.getElementById('fc-count').innerText = `Card ${fIdx + 1} / ${fList.length}`;
    }, 150);
}

function moveFC(d) { fIdx = (fIdx + d + fList.length) % fList.length; updateFC(); }
function masterFC() { score += 2; tMax += 2; updateGrade(); moveFC(1); confetti(); }

function renderGrid() {
    const g = document.getElementById('ex-grid');
    g.innerHTML = '';
    eList.forEach((_, i) => {
        const n = document.createElement('div');
        n.className = 'q-num';
        n.innerText = i + 1;
        n.onclick = () => { eIdx = i; updateEX(); };
        g.appendChild(n);
    });
}

function updateEX() {
    const q = eList[eIdx];
    document.getElementById('ex-tag').innerText = curTopic === 'ALL' ? 'MIXED' : curTopic;
    document.getElementById('ex-count').innerText = `Question ${eIdx + 1} / ${eList.length}`;
    document.getElementById('ex-question').innerText = q.q;
    document.getElementById('ex-ans').value = "";
    document.querySelectorAll('.q-num').forEach((n, i) => n.classList.toggle('active', i === eIdx));
}

function moveEX(d) { eIdx = (eIdx + d + eList.length) % eList.length; updateEX(); }

function openGrade() {
    const q = eList[eIdx];
    document.getElementById('m-user').innerText = document.getElementById('ex-ans').value || "No answer provided.";
    document.getElementById('m-scheme').innerText = q.ms;
    document.getElementById('m-max').innerText = q.max;
    document.getElementById('modal').style.display = 'flex';
}

function confirmGrade() {
    const s = parseInt(document.getElementById('m-score').value) || 0;
    score += s; tMax += eList[eIdx].max;
    document.getElementById('modal').style.display = 'none';
    updateGrade();
    if(s >= eList[eIdx].max) confetti();
}

function updateGrade() {
    const p = (score / tMax) * 100;
    let g = "U", c = "#94a3b8";
    if(p >= 80) { g = "Dist*"; c = "#f59e0b"; }
    else if(p >= 65) { g = "Dist"; c = "#a855f7"; }
    else if(p >= 50) { g = "Merit"; c = "#3b82f6"; }
    else if(p >= 40) { g = "Pass"; c = "#10b981"; }
    document.getElementById('grade-badge').innerText = "GRADE: " + g;
    document.getElementById('grade-badge').style.background = c;
}

setTopic('ALL', document.querySelector('.filter-btn'));
</script>
</body>
</html>
